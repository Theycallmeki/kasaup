version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kasaup-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: kasaup2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kasaup-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kasaup-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:12345678@db:5432/kasaup2}
      ALLOWED_ORIGINS: "http://167.172.66.181:3000,http://localhost:5173,https://kasaup.vercel.app,https://167.172.66.181.nip.io"
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - kasaup-network

  nginx:
    image: nginx:1.25-alpine
    container_name: kasaup-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - kasaup-network

  certbot:
    image: certbot/certbot
    container_name: kasaup-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email laxamana.kian13@gmail.com -d 167.172.66.181.nip.io --agree-tos --no-eff-email

networks:
  kasaup-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
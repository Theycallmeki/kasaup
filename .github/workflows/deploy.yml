name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to the project folder
            cd /app || { echo "Directory /app not found"; exit 1; }
            
            # 2. Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # 3. Export secrets
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            
            # 4. Ensure SMTP credentials are in backend .env
            grep -q "SMTP_USER" /app/backend/.env 2>/dev/null || cat >> /app/backend/.env << 'SMTP_EOF'

# Email (Gmail SMTP)
SMTP_USER=${{ secrets.SMTP_USER }}
SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
SMTP_EOF
            
            # 5. Clean restart services
            docker-compose down
            docker-compose up -d --build
            
            # 6. Verify status
            echo "--- Container Status ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "--- Backend Logs (Last 10 lines) ---"
            docker logs kasaup-backend --tail 10
            
            # 7. Cleanup old images
            docker system prune -f
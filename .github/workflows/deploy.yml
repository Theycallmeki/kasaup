name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to the project folder
            cd /app || { echo "Directory /app not found"; exit 1; }
            
            # 2. Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # 3. Export secrets
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            
            # 4. Recreate the backend .env file from GitHub Secrets
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > /app/backend/.env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> /app/backend/.env
            echo "ALGORITHM=HS256" >> /app/backend/.env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}" >> /app/backend/.env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}" >> /app/backend/.env
            echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> /app/backend/.env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> /app/backend/.env
            echo "SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}" >> /app/backend/.env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> /app/backend/.env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> /app/backend/.env
            echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> /app/backend/.env
            echo "GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}" >> /app/backend/.env
            echo "GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}" >> /app/backend/.env
            echo "GH_REDIRECT_URI=${{ secrets.GH_REDIRECT_URI }}" >> /app/backend/.env
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> /app/backend/.env
            echo "ALLOWED_ORIGINS=${{ secrets.FRONTEND_URL }},https://kasaup.vercel.app" >> /app/backend/.env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> /app/backend/.env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> /app/backend/.env
            echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> /app/backend/.env
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> /app/backend/.env
            
            # 5. Clean restart services
            docker-compose down
            docker-compose up -d --build
            
            # 6. Verify status
            echo "--- Container Status ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "--- Backend Logs (Last 10 lines) ---"
            docker logs kasaup-backend --tail 10
            
            # 7. Cleanup old images
            docker system prune -f
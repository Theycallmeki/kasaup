name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to the project folder
            cd /app || { echo "Directory /app not found"; exit 1; }
            
            # 2. Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # 3. Export secrets
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            
            # 4. Recreate the backend .env file from GitHub Secrets (Source of Truth)
            printf "DATABASE_URL=%s\nSECRET_KEY=%s\nALGORITHM=HS256\nSMTP_USER=%s\nSMTP_PASSWORD=%s\nSMTP_FROM_EMAIL=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nGOOGLE_REDIRECT_URI=%s\nGH_CLIENT_ID=%s\nGH_CLIENT_SECRET=%s\nGH_REDIRECT_URI=%s\nFRONTEND_URL=%s\n" \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.SECRET_KEY }}" \
            "${{ secrets.SMTP_USER }}" \
            "${{ secrets.SMTP_PASSWORD }}" \
            "${{ secrets.SMTP_FROM_EMAIL }}" \
            "${{ secrets.GOOGLE_CLIENT_ID }}" \
            "${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "${{ secrets.GOOGLE_REDIRECT_URI }}" \
            "${{ secrets.GH_CLIENT_ID }}" \
            "${{ secrets.GH_CLIENT_SECRET }}" \
            "${{ secrets.GH_REDIRECT_URI }}" \
            "${{ secrets.FRONTEND_URL }}" > /app/backend/.env
            
            # 5. Clean restart services
            docker-compose down
            docker-compose up -d --build
            
            # 6. Verify status
            echo "--- Container Status ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "--- Backend Logs (Last 10 lines) ---"
            docker logs kasaup-backend --tail 10
            
            # 7. Cleanup old images
            docker system prune -f
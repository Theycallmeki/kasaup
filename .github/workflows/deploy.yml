name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Navigate to the project folder
            cd /app || { echo "Directory /app not found"; exit 1; }
            
            # 2. Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # 3. Export secrets
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            
            # 4. Clean restart services
            # This ensures we don't have conflicting abandoned containers
            docker-compose down
            docker-compose up -d --build
            
            # 5. Verify status (visible in GitHub Action logs)
            echo "--- Container Status ---"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            
            echo "--- Backend Logs (Last 10 lines) ---"
            docker logs kasaup-backend --tail 10
            
            # 6. Cleanup old images
            docker system prune -f